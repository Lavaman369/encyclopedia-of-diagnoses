<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page_title">Encyclopedia of Diagnoses — Project Hospital</title>
  <link rel="icon" type="image/png" href="assets/diagnostic-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header id="site-header">
    <div class="header-inner">
      <a class="site-logo" href="#/home">
        <span class="logo-text" data-i18n="site_title">Encyclopedia of Diagnoses</span>
      </a>

      <nav id="main-nav" role="navigation" aria-label="Main navigation">
        <a class="nav-tab nav-tab--tool" href="#/diagnostic" data-tab="diagnostic" data-i18n="nav_diagnostic">Diagnostic Tool</a>
        <a class="nav-tab" href="#/diagnoses" data-tab="diagnoses" data-i18n="nav_diagnoses">Diagnoses</a>
        <a class="nav-tab" href="#/symptoms" data-tab="symptoms" data-i18n="nav_symptoms">Symptoms</a>
        <a class="nav-tab" href="#/examinations" data-tab="examinations" data-i18n="nav_examinations">Examinations</a>
        <a class="nav-tab" href="#/treatments" data-tab="treatments" data-i18n="nav_treatments">Treatments</a>
        <a class="nav-tab" href="#/statistics" data-tab="statistics" data-i18n="nav_statistics">Statistics</a>
        <a class="nav-tab" href="#/about" data-tab="about" data-i18n="nav_about">About / FAQ</a>
      </nav>

      <div class="global-search-wrap" id="global-search-wrap">
        <input class="global-search-input" id="global-search-input" type="search"
               placeholder="Search diagnoses, symptoms, exams…"
               data-i18n-placeholder="search_placeholder"
               autocomplete="off" aria-label="Global search">
        <div class="global-search-dropdown" id="global-search-dropdown" role="listbox" aria-hidden="true"></div>
      </div>

      <div class="lang-picker" id="lang-picker"></div>
      <button id="mods-puzzle-btn" class="mods-puzzle-btn" hidden title="Community Mods — click to show">🧩</button>

    </div>
  </header>

  <div id="mods-banner" class="mods-banner" hidden></div>

  <main id="app-root" role="main">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <p data-i18n="loading_game_data">Loading game data…</p>
    </div>
  </main>

  <footer id="site-footer" class="site-footer">
    <p data-i18n="footer_disclaimer">Fan-made reference for Project Hospital by Oxymoron Games. Not affiliated with or endorsed by the developer.</p>
    <p class="site-footer-links">
      <span data-i18n="footer_made_by">Made by Lavaman</span>
      <span class="site-footer-sep" aria-hidden="true">•</span>
      <a href="https://ko-fi.com/G6J72166YI" target="_blank" rel="noopener noreferrer" data-i18n="footer_kofi">Support on Ko-fi</a>
    </p>
  </footer>

  <script type="module" src="js/app.js"></script>

  <script type="text/javascript" src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
  <script type="text/javascript">
    kofiWidgetOverlay.draw('G6J72166YI', {
      'type': 'floating-chat',
      'floating-chat.donateButton.text': 'Support me',
      'floating-chat.donateButton.background-color': '#72a4f2',
      'floating-chat.donateButton.text-color': '#fff'
    });
  </script>
</body>
</html>
